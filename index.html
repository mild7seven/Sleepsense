<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SleepSense AI - Visual Playback</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands"></script>

    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --primary: #6366f1;
            --success: #10b981;
            --danger: #f43f5e;
            --text: #f1f5f9;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .header { text-align: center; margin-bottom: 20px; }
        .badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: #334155;
            text-transform: uppercase;
        }
        canvas {
            width: 100%;
            height: 140px;
            background: #000;
            border-radius: 12px;
            margin: 15px 0;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 12px;
            border-bottom: 3px solid var(--primary);
        }
        .stat-label { font-size: 0.8rem; color: #94a3b8; }
        .stat-value { font-size: 1.1rem; font-weight: 700; margin-top: 5px; }
        
        .alarm-box {
            background: #0f172a;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        input[type="time"] {
            background: var(--card);
            border: 1px solid #475569;
            color: white;
            padding: 8px;
            border-radius: 8px;
        }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        .btn-row { display: flex; gap: 10px; }
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-start { background: var(--primary); color: white; }
        .btn-stop { background: var(--danger); color: white; }
        .btn-play { background: var(--success); color: white; display: none; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .playback-area { margin-top: 20px; text-align: center; }
        audio { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <span class="badge" id="modelStatus">Loading AI Model...</span>
        <h2>SleepSense AI</h2>
    </div>

    <div class="alarm-box">
        <span>Wake-up Alarm</span>
        <input type="time" id="alarmTime">
    </div>

    <canvas id="viz"></canvas>

    <div class="grid">
        <div class="stat-card">
            <div class="stat-label">Sleep Phase</div>
            <div id="phaseDisplay" class="stat-value">Awake</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">AI Detection</div>
            <div id="aiDisplay" class="stat-value">Silent</div>
        </div>
    </div>

    <div class="controls">
        <div class="btn-row">
            <button id="startBtn" class="btn-start" disabled>Start Monitoring</button>
            <button id="stopBtn" class="btn-stop" disabled>Stop</button>
        </div>
        <button id="playBtn" class="btn-play">▶ Play Last Recording</button>
    </div>

    <div class="playback-area">
        <audio id="audioPlayback" controls></audio>
        <p id="playbackMsg" style="font-size: 0.8rem; color: #94a3b8;"></p>
    </div>
</div>

<script>
    /*
     * SleepSense AI Engine - Visual Playback Edition
     */
    let aiRecognizer, wordLabels;
    let audioCtx, source, analyser, noiseGate, mediaRecorder;
    let playbackSource;
    let chunks = [];
    let isActive = false;
    let isPlaying = false;
    let recordedBlobUrl = null;
    let startTime;
    let uiInterval, alarmInterval;

    const UI = {
        status: document.getElementById('modelStatus'),
        ai: document.getElementById('aiDisplay'),
        phase: document.getElementById('phaseDisplay'),
        start: document.getElementById('startBtn'),
        stop: document.getElementById('stopBtn'),
        play: document.getElementById('playBtn'),
        canvas: document.getElementById('viz'),
        ctx: document.getElementById('viz').getContext('2d'),
        alarm: document.getElementById('alarmTime'),
        audio: document.getElementById('audioPlayback'),
        msg: document.getElementById('playbackMsg')
    };

    async function loadModel() {
        try {
            aiRecognizer = speechCommands.create('BROWSER_FFT');
            await aiRecognizer.ensureModelLoaded();
            wordLabels = aiRecognizer.wordLabels();
            UI.status.innerText = "AI Online";
            UI.status.style.background = "var(--success)";
            UI.start.disabled = false;
        } catch (e) {
            UI.status.innerText = "Network Error";
            UI.status.style.background = "var(--danger)";
        }
    }

    loadModel();

    UI.start.onclick = async () => {
        try {
            if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            initRecordingPipeline(stream);
            startAIListening();
            
            isActive = true;
            isPlaying = false;
            startTime = Date.now();
            UI.start.disabled = true;
            UI.stop.disabled = false;
            UI.play.style.display = "none";
            UI.msg.innerText = "Monitoring and recording...";
            
            monitorSleep();
            checkAlarm();
            drawVisualizer();
        } catch (err) {
            alert("Microphone permission required.");
        }
    };

    UI.stop.onclick = () => {
        isActive = false;
        if(mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
        if(aiRecognizer && aiRecognizer.isListening()) aiRecognizer.stopListening();
        
        clearInterval(uiInterval);
        clearInterval(alarmInterval);
        
        UI.start.disabled = false;
        UI.stop.disabled = true;
        UI.phase.innerText = "Awake";
        UI.ai.innerText = "Stopped";
    };

    function initRecordingPipeline(stream) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        source = audioCtx.createMediaStreamSource(stream);
        
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;
        
        noiseGate = audioCtx.createGain();
        noiseGate.gain.value = 0; 

        source.connect(analyser);
        source.connect(noiseGate);
        
        const dest = audioCtx.createMediaStreamDestination();
        noiseGate.connect(dest);

        mediaRecorder = new MediaRecorder(dest.stream);
        chunks = [];
        mediaRecorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'audio/webm' });
            recordedBlobUrl = URL.createObjectURL(blob);
            UI.audio.src = recordedBlobUrl;
            UI.play.style.display = "block";
            UI.msg.innerText = "Recording saved. Click play to review with visualizer.";
        };
        mediaRecorder.start();
    }

    function startAIListening() {
        aiRecognizer.listen(result => {
            if(!isActive) return;
            let maxScore = -1;
            let classIndex = -1;
            for(let i = 0; i < result.scores.length; i++) {
                if(result.scores[i] > maxScore) {
                    maxScore = result.scores[i];
                    classIndex = i;
                }
            }
            const detectedClass = wordLabels[classIndex];

            if (detectedClass === '_background_noise_') {
                noiseGate.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                UI.ai.innerText = "Filtering Noise";
            } else {
                noiseGate.gain.setTargetAtTime(1, audioCtx.currentTime, 0.1);
                UI.ai.innerText = "Vocal Detected";
                UI.ai.style.color = "var(--success)";
            }
        }, { probabilityThreshold: 0.70 });
    }

    // Playback Logic with Synchronized Visualizer
    UI.play.onclick = async () => {
        if (isPlaying) {
            UI.audio.pause();
            return;
        }

        if (audioCtx.state === 'suspended') await audioCtx.resume();

        // Disconnect previous sources if any
        if (playbackSource) playbackSource.disconnect();
        
        // Create playback source from the audio element
        playbackSource = audioCtx.createMediaElementSource(UI.audio);
        playbackSource.connect(analyser);
        analyser.connect(audioCtx.destination);

        UI.audio.play();
        isPlaying = true;
        isActive = true; // Trigger draw loop
        UI.play.innerText = "⏸ Pause Playback";
        UI.ai.innerText = "Playing Recording...";
        
        drawVisualizer();

        UI.audio.onended = () => {
            isPlaying = false;
            isActive = false;
            UI.play.innerText = "▶ Play Last Recording";
            UI.ai.innerText = "Playback Finished";
        };
    };

    function monitorSleep() {
        uiInterval = setInterval(() => {
            const elapsed = (Date.now() - startTime) / 60000;
            const cycleMin = elapsed % 90;
            UI.phase.innerText = cycleMin < 65 ? "NREM (Deep Sleep)" : "REM (Dream Phase)";
        }, 1000);
    }

    function checkAlarm() {
        alarmInterval = setInterval(() => {
            if(!UI.alarm.value) return;
            const now = new Date();
            const current = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            if(current === UI.alarm.value && now.getSeconds() === 0) {
                alert("⏰ Wake up!");
            }
        }, 1000);
    }

    function drawVisualizer() {
        if(!isActive && !isPlaying) return;
        requestAnimationFrame(drawVisualizer);
        
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteTimeDomainData(data);
        
        UI.ctx.fillStyle = '#020617';
        UI.ctx.fillRect(0,0, UI.canvas.width, UI.canvas.height);
        UI.ctx.lineWidth = 3;
        UI.ctx.strokeStyle = isPlaying ? '#10b981' : '#6366f1';
        UI.ctx.beginPath();
        
        let x = 0;
        const slice = UI.canvas.width / data.length;
        for(let i=0; i<data.length; i++) {
            const v = data[i] / 128.0;
            const y = v * UI.canvas.height / 2;
            i === 0 ? UI.ctx.moveTo(x,y) : UI.ctx.lineTo(x,y);
            x += slice;
        }
        UI.ctx.lineTo(UI.canvas.width, UI.canvas.height/2);
        UI.ctx.stroke();
    }

    if('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
